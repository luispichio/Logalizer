name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v0.2.47"
        required: true

permissions:
  contents: write

jobs:
  linux-packages:
    name: Linux packages
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            dpkg-dev \
            file \
            libfuse2 \
            libgl1-mesa-dev \
            libvulkan-dev \
            libxkbcommon-dev \
            ninja-build \
            qt6-base-dev \
            qt6-tools-dev \
            qt6-tools-dev-tools \
            rpm \
            wget

      - name: Build packages
        run: scripts/package-release.sh

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: logalizer-linux-packages
          path: dist/*
          if-no-files-found: error

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
          else
            gh release create "$RELEASE_TAG" dist/* --title "$RELEASE_TAG" --generate-notes
          fi
